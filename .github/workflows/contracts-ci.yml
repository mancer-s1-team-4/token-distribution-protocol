name: contracts-ci

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  workflow_dispatch:

concurrency:
  group: contracts-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ANCHOR_VERSION: 0.32.1
  SOLANA_VERSION: 2.1.21
  RUST_TOOLCHAIN: 1.89.0
  CARGO_TERM_COLOR: always

jobs:
  anchor:
    name: Anchor build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt,clippy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('contracts/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        id: solana-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Cache Anchor CLI
        id: anchor-cache
        uses: actions/cache@v4
        with:
          path: ~/.avm
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Cache Anchor build outputs
        uses: actions/cache@v4
        with:
          path: |
            contracts/target
            contracts/.anchor
          key: ${{ runner.os }}-anchor-target-${{ env.RUST_TOOLCHAIN }}-${{ env.SOLANA_VERSION }}-${{ env.ANCHOR_VERSION }}-${{ hashFiles('contracts/Cargo.lock', 'contracts/pnpm-lock.yaml', 'contracts/programs/**/*.rs', 'contracts/programs/**/Cargo.toml', 'contracts/Anchor.toml') }}
          restore-keys: |
            ${{ runner.os }}-anchor-target-${{ env.RUST_TOOLCHAIN }}-${{ env.SOLANA_VERSION }}-${{ env.ANCHOR_VERSION }}-
            ${{ runner.os }}-anchor-target-${{ env.RUST_TOOLCHAIN }}-

      - name: Install Solana CLI
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"

      - name: Add Solana CLI to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor Version Manager
        run: |
          if ! command -v avm >/dev/null 2>&1; then
            cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          fi

      - name: Add Anchor Version Manager to PATH
        run: echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        if: steps.anchor-cache.outputs.cache-hit != 'true'
        run: avm install $ANCHOR_VERSION

      - name: Select Anchor CLI
        run: avm use $ANCHOR_VERSION

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Show tool versions
        run: |
          rustc --version
          cargo --version
          solana --version
          anchor --version
          pnpm --version
          node --version

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test
